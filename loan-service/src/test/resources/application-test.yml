spring:
  cloud:
    config:
      enabled: false
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 5
        minimum-number-of-calls: 3
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
        permitted-number-of-calls-in-half-open-state: 1
        automatic-transition-from-open-to-half-open-enabled: true
    instances:
      bookService:
        base-config: default
        ignoreExceptions:
          - com.apulia.loanservice.exception.ValidationException
      memberService:
        base-config: default
        ignoreExceptions:
          - com.apulia.loanservice.exception.ValidationException
  retry:
    configs:
      default:
        max-attempts: 2
        wait-duration: 100ms
        retry-exceptions:
          - org.springframework.web.client.HttpServerErrorException
          - org.springframework.web.client.ResourceAccessException
    instances:
      bookService:
        base-config: default
      memberService:
        base-config: default
  timelimiter:
    configs:
      default:
        timeout-duration: 5s
    instances:
      bookService:
        base-config: default
      memberService:
        base-config: default
