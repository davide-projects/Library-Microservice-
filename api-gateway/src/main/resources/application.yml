server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:

        - id: book-service
          uri: http://book-service:8081
          predicates:
            - Path=/book/**

        - id: member-service
          uri: http://member-service:8082
          predicates:
            - Path=/member/**

        - id: loan-service
          uri: http://loan-service:8083
          predicates:
            - Path=/loan/**

security:
  tokens:
    valid:
      - my-secret-token-123

management:
  endpoints:
    web:
      exposure:
        include: health
